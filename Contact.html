<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="0favicon.ico">
    <title>Portofolio | L0r3ntz</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">

    <!-- My CSS -->
    <link rel="stylesheet" href="css/css3.css">
    <!-- My Javascript -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8475511792400505"
     crossorigin="anonymous"></script>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light ">
        <div class="container" style="font-family: sans-serif;">
            <a class="navbar-brand" style="font-weight:bolder;" href="index.html">L0r3ntz</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"
                aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" aria-current="page" href="index.html">Home</a>
                    <a class="nav-link" href="project.html">Project</a>
                    <a class="nav-link active" href="#">Contact</a>
                </div>
            </div>
        </div>
    </nav>
    <!-- Akhir Navbar -->

    <!-- Form -->
    <form name='Contact-form'>
        <div class="mb-3">
            <h1 class="text-center">Contact Me!</h1>
            <label for="Name" class="form-label">Name</label>
            <input type="text" class="form-control" id="name" aria-describedby="name" name="nama">
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="name" aria-describedby="email" name="email">
        </div>
        <div class="mb-3">
            <label for="Pesan" class="form-label">Message</label>
            <textarea class="form-control" id="pesan" rows="3" name="pesan"></textarea>
        </div>
        <button type="submit" class="btn btn-dark fw-bold">Send</button>
    </form>
    <!-- Akhir Form -->

    <!-- Footer -->
    <div class="container">
        <footer class="d-flex flex-wrap justify-content-center align-items-center py-3 my-4 border-top">
            <div class="align-items-center">
                <span class="text-muted">© 2021 <a href="https://www.instagram.com/l0r3ntz__/"
                        class="text-dark fw-bold">L0r3ntz</a></span>
            </div>
        </footer>
    </div>
    <!-- Akhir Footer -->
    <script src="js/bootstrap.min.js"></script>

    <script>
        const scriptURL =
            'https://script.google.com/macros/s/AKfycbxsXogk4IvaprdW6UYb37qbOtS2LO2I3aZpepJIl8lCqOQU-KoGepobnsiArKYtEvdQdA/exec'
        const form = document.forms['Contact-form']

        form.addEventListener('submit', e => {
            e.preventDefault()
            // ketika tombol send di klik
            fetch(scriptURL, {
                    method: 'POST',
                    body: new FormData(form)
                })
                .then(response => {
                    // reset form
                    form.reset();
                    console.log('Success!', response)
                })
                .catch(error => console.error('Error!', error.message))
        })
    </script>
</body>

</html>
